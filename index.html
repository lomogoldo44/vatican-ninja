<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vatican II Ninja</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #2c3e50; --primary: #b30000; --border: #e0e0e0; --card-bg: #ffffff; --sidebar: #f4f4f4; --highlight: #ffeb3b; }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --primary: #ffcc00; --border: #333; --card-bg: #1e1e1e; --sidebar: #181818; --highlight: #665200; }
        
        body { font-family: "Georgia", serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; }
        
        header { padding: 12px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); z-index: 100; }
        .logo { font-family: sans-serif; color: var(--primary); font-weight: bold; font-size: 1.4rem; text-decoration: none; cursor: pointer; }

        .layout { display: flex; flex: 1; overflow: hidden; }
        
        aside { width: 280px; border-right: 1px solid var(--border); background: var(--sidebar); overflow-y: auto; padding: 20px; }
        .doc-link { display: block; padding: 10px; margin-bottom: 4px; border-radius: 5px; text-decoration: none; color: var(--text); font-size: 0.85rem; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .doc-link:hover { background: var(--primary); color: white; }

        main { flex: 1; overflow-y: auto; padding: 30px; }
        
        /* Enhanced Search Bar */
        .search-container { max-width: 800px; margin: 0 auto 30px auto; display: flex; gap: 10px; flex-wrap: wrap; }
        .doc-select { flex: 1; min-width: 200px; padding: 15px; border-radius: 8px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; cursor: pointer; outline: none; }
        .search-box { flex: 2; min-width: 300px; padding: 15px; font-size: 1.1rem; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; }
        .search-box:focus, .doc-select:focus { border-color: var(--primary); }

        .results { max-width: 800px; margin: 0 auto; }
        .result-card { background: var(--card-bg); padding: 25px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .doc-header { font-family: sans-serif; font-size: 0.7rem; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; }
        
        .paragraph-content { line-height: 1.8; font-size: 1.1rem; }
        
        /* Word Enhancement (Highlighting) */
        mark { background: var(--highlight); color: var(--text); padding: 0 2px; border-radius: 3px; font-weight: bold; border-bottom: 2px solid var(--primary); }

        .theme-btn { border: 1px solid var(--border); background: none; color: var(--text); padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        @media (max-width: 768px) { aside { display: none; } .search-container { flex-direction: column; } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">Vatican II Ninja</div>
    <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
</header>

<div class="layout">
    <aside id="sidebar-docs">
        <h4 style="font-family:sans-serif; font-size:0.75rem; color:gray; text-transform:uppercase;">Library</h4>
    </aside>

    <main>
        <div class="search-container">
            <select id="docFilter" class="doc-select" onchange="doSearch()">
                <option value="ALL">All Documents</option>
            </select>
            <input type="text" id="search" class="search-box" placeholder="Type a word or number..." autofocus oninput="doSearch()">
        </div>
        
        <div id="results" class="results"></div>
    </main>
</div>

<script>
    let fuse;
    let fullData = [];

    fetch('vatican2.json')
        .then(res => res.json())
        .then(data => {
            fullData = data;
            
            const names = [...new Set(data.map(i => i.doc))].sort();
            const sidebar = document.getElementById('sidebar-docs');
            const select = document.getElementById('docFilter');

            names.forEach(n => {
                sidebar.innerHTML += `<div class="doc-link" onclick="loadFullDoc('${n}')">${n}</div>`;
                select.innerHTML += `<option value="${n}">${n}</option>`;
            });

            fuse = new Fuse(data, { keys: ['text'], threshold: 0.4, ignoreLocation: true });
        });

    function loadFullDoc(docName) {
        document.getElementById('docFilter').value = docName;
        document.getElementById('search').value = ""; 
        doSearch();
    }

    function doSearch() {
        const query = document.getElementById('search').value.trim();
        const docName = document.getElementById('docFilter').value;
        const container = document.getElementById('results');

        if (!query && docName === "ALL") { container.innerHTML = ''; return; }

        let filtered = fullData;
        if (docName !== "ALL") {
            filtered = fullData.filter(item => item.doc === docName);
        }

        let results = [];
        if (query === "") {
            results = filtered.slice(0, 20); // Show first 20 if no query
        } else if (!isNaN(query)) {
            results = filtered.filter(item => item.text.startsWith(query + ".") || item.text.startsWith(query + " "));
        } else {
            const tempFuse = new Fuse(filtered, { keys: ['text'], threshold: 0.4 });
            results = tempFuse.search(query).map(r => r.item);
        }

        render(results, query);
    }

    function render(items, highlightTerm) {
        const container = document.getElementById('results');
        if (items.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:gray;">No results found.</p>';
            return;
        }

        container.innerHTML = items.map(item => {
            let bodyText = item.text;
            // Enhanced word highlighting logic
            if (highlightTerm && isNaN(highlightTerm)) {
                const regex = new RegExp(`(${highlightTerm})`, 'gi');
                bodyText = bodyText.replace(regex, '<mark>$1</mark>');
            }
            
            return `
                <div class="result-card">
                    <div class="doc-header">${item.doc}</div>
                    <div class="paragraph-content">${bodyText}</div>
                </div>
            `;
        }).join('');
    }

    function toggleTheme() {
        document.body.hasAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
    }
</script>
</body>
</html>
