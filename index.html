<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vatican II Ninja</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        /* CanonLaw.Ninja Color Palette & Typography */
        :root { 
            --bg: #ffffff; 
            --text: #333333; 
            --sidebar-bg: #f8f9fa; 
            --primary: #0056b3; 
            --border: #dee2e6; 
            --highlight: #fff9c4;
            --accent: #6c757d;
        }

        [data-theme="dark"] { 
            --bg: #1e1e1e; 
            --text: #d4d4d4; 
            --sidebar-bg: #252526; 
            --primary: #3794ff; 
            --border: #444444; 
            --highlight: #3e3700;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: var(--bg); 
            color: var(--text);
            overflow: hidden;
        }

        /* SIDEBAR (Left Navigation) */
        aside { 
            width: 260px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        .sidebar-header {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .doc-link {
            padding: 8px 12px;
            font-size: 0.9rem;
            color: var(--text);
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-link:hover { background: var(--border); }
        .doc-link.active { background: var(--primary); color: white; }

        /* MAIN CONTENT AREA (Right) */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* SEARCH TOOLBAR (Top of Main) */
        .toolbar {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input-group {
            display: flex;
            flex: 1;
            max-width: 600px;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .doc-select {
            border: none;
            background: var(--sidebar-bg);
            padding: 8px;
            color: var(--text);
            font-size: 0.9rem;
            border-right: 1px solid var(--border);
            outline: none;
            width: 160px;
        }

        .search-box {
            flex: 1;
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* CONTENT RESULTS */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 40px 60px;
        }

        .result-item {
            margin-bottom: 30px;
            line-height: 1.6;
            max-width: 800px;
        }

        .canon-label {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
            display: block;
            font-family: serif;
            font-size: 1.1rem;
        }

        .paragraph-text {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 1.15rem;
            text-align: justify;
        }

        mark { background: var(--highlight); color: inherit; padding: 0 2px; }

        @media (max-width: 768px) {
            aside { display: none; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .content-scroll { padding: 20px; }
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">Vatican II Ninja</div>
    <div id="doc-list"></div>
    <div style="margin-top:auto; padding-top:20px;">
        <button class="btn" style="width:100%" onclick="toggleTheme()">Toggle Theme</button>
    </div>
</aside>

<main>
    <div class="toolbar">
        <div class="search-input-group">
            <select id="docFilter" class="doc-select" onchange="doSearch()">
                <option value="ALL">All Documents</option>
            </select>
            <input type="text" id="search" class="search-box" placeholder="Search word or paragraph number..." oninput="doSearch()">
        </div>
        <button class="btn" onclick="document.getElementById('search').value=''; doSearch();">Clear</button>
    </div>

    <div class="content-scroll" id="results">
        <div style="color:gray; text-align:center; margin-top:100px;">
            Select a document from the left or type to search.
        </div>
    </div>
</main>

<script>
    let fuse;
    let fullData = [];

    fetch('vatican2.json')
        .then(res => res.json())
        .then(data => {
            fullData = data;
            
            const names = [...new Set(data.map(i => i.doc))].sort();
            const sidebar = document.getElementById('doc-list');
            const select = document.getElementById('docFilter');

            names.forEach(n => {
                sidebar.innerHTML += `<div class="doc-link" onclick="loadFullDoc('${n}')">${n}</div>`;
                select.innerHTML += `<option value="${n}">${n}</option>`;
            });

            fuse = new Fuse(data, { keys: ['text'], threshold: 0.35, ignoreLocation: true });
        });

    function loadFullDoc(docName) {
        document.getElementById('docFilter').value = docName;
        document.getElementById('search').value = ""; 
        doSearch();
        
        // Mark sidebar active
        document.querySelectorAll('.doc-link').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
    }

    function doSearch() {
        const query = document.getElementById('search').value.trim();
        const docName = document.getElementById('docFilter').value;
        const container = document.getElementById('results');

        if (!query && docName === "ALL") { 
            container.innerHTML = '<div style="color:gray; text-align:center; margin-top:100px;">Select a document or search above.</div>'; 
            return; 
        }

        let filtered = fullData;
        if (docName !== "ALL") {
            filtered = fullData.filter(item => item.doc === docName);
        }

        let results = [];
        if (query === "") {
            results = filtered;
        } else if (!isNaN(query)) {
            results = filtered.filter(item => item.text.startsWith(query + ".") || item.text.startsWith(query + " "));
        } else {
            const tempFuse = new Fuse(filtered, { keys: ['text'], threshold: 0.35 });
            results = tempFuse.search(query).map(r => r.item);
        }

        render(results, query);
    }

    function render(items, term) {
        const container = document.getElementById('results');
        if (items.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:gray;">No results found.</p>';
            return;
        }

        container.innerHTML = items.map(item => {
            let bodyText = item.text;
            if (term && isNaN(term)) {
                const regex = new RegExp(`(${term})`, 'gi');
                bodyText = bodyText.replace(regex, '<mark>$1</mark>');
            }
            
            return `
                <div class="result-item">
                    <span class="canon-label">${item.doc}</span>
                    <div class="paragraph-text">${bodyText}</div>
                </div>
            `;
        }).join('');
    }

    function toggleTheme() {
        document.body.hasAttribute('data-theme') ? 
        document.body.removeAttribute('data-theme') : 
        document.body.setAttribute('data-theme', 'dark');
    }
</script>
</body>
</html>
