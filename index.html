<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lomogoldo Vatican II - DBCS Standard</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --primary: #4da3ff; --border: #333; --highlight: #443e00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        aside { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .sidebar-header { font-weight: bold; font-size: 1.2rem; color: var(--primary); margin-bottom: 25px; text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .doc-link { padding: 10px 15px; font-size: 0.9rem; color: #bbb; text-decoration: none; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: 0.3s; }
        .doc-link:hover { background: #333; color: white; }
        .doc-link.active { background: var(--primary); color: white; }
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { padding: 15px 30px; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; gap: 12px; align-items: center; }
        .search-group { display: flex; flex: 1; max-width: 800px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: #252526; }
        .doc-select { border: none; background: transparent; padding: 10px; color: var(--text); font-size: 0.9rem; border-right: 1px solid var(--border); outline: none; width: 220px; cursor: pointer; }
        .search-box { flex: 1; border: none; padding: 12px 18px; font-size: 1rem; background: transparent; color: var(--text); outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        .content-area { flex: 1; overflow-y: auto; padding: 40px 10%; scroll-behavior: smooth; }
        .result-card { margin-bottom: 50px; line-height: 1.8; padding: 25px; background: #1e1e1e; border-radius: 12px; border: 1px solid var(--border); }
        .meta-tag { font-weight: bold; color: var(--primary); margin-bottom: 15px; display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .para-content { font-family: 'Georgia', serif; font-size: 1.2rem; text-align: justify; white-space: pre-wrap; margin-bottom: 20px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; border-top: 1px solid var(--border); padding-top: 20px; }
        .action-btn { background: #2d2d2d; border: 1px solid var(--border); color: #ccc; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .action-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .copy-special { border-color: #4caf50; color: #4caf50; }
        .copy-special:hover { background: #4caf50; }
        mark { background: var(--highlight); color: #fff; padding: 2px 0; border-radius: 2px; }
    </style>
</head>
<body>

<aside>
    <div class="sidebar-header">Vatican II Explorer</div>
    <div id="doc-list"></div>
</aside>

<main>
    <div class="toolbar">
        <div class="search-group">
            <select id="docFilter" class="doc-select" onchange="doSearch()">
                <option value="ALL">All Documents</option>
            </select>
            <input type="text" id="searchInput" class="search-box" placeholder="Search keywords or paragraph #..." oninput="doSearch()">
        </div>
        <button class="btn" onclick="resetUI()">Reset</button>
    </div>
    <div class="content-area" id="results"></div>
</main>

<script>
    let rawData = [];
    let fuse;
    const { jsPDF } = window.jspdf;

    // Official DBCS Metadata Registry
    const vaticanMeta = {
        "Dei Verbum": { abbr: "DV", date: "18 November 1965", officialTitle: "Dogmatic Constitution on Divine Revelation" },
        "Lumen Gentium": { abbr: "LG", date: "21 November 1964", officialTitle: "Dogmatic Constitution on the Church" },
        "Sacrosanctum Concilium": { abbr: "SC", date: "4 December 1963", officialTitle: "Constitution on the Sacred Liturgy" },
        "Gaudium et Spes": { abbr: "GS", date: "7 December 1965", officialTitle: "Pastoral Constitution on the Church in the Modern World" },
        "Unitatis Redintegratio": { abbr: "UR", date: "21 November 1964", officialTitle: "Decree on Ecumenism" },
        "Orientalium Ecclesiarum": { abbr: "OE", date: "21 November 1964", officialTitle: "Decree on the Catholic Churches of the Eastern Rite" },
        "Ad Gentes": { abbr: "AG", date: "7 December 1965", officialTitle: "Decree on the Mission Activity of the Church" },
        "Presbyterorum Ordinis": { abbr: "PO", date: "7 December 1965", officialTitle: "Decree on the Ministry and Life of Priests" },
        "Apostolicam Actuositatem": { abbr: "AA", date: "18 November 1965", officialTitle: "Decree on the Apostolate of the Laity" },
        "Optatam Totius": { abbr: "OT", date: "28 October 1965", officialTitle: "Decree on Priestly Training" },
        "Perfectae Caritatis": { abbr: "PC", date: "28 October 1965", officialTitle: "Decree on the Adaptation and Renewal of Religious Life" },
        "Christus Dominus": { abbr: "CD", date: "28 October 1965", officialTitle: "Decree Concerning the Pastoral Office of Bishops in the Church" },
        "Inter Mirifica": { abbr: "IM", date: "4 December 1963", officialTitle: "Decree on the Media of Social Communications" },
        "Nostra Aetate": { abbr: "NA", date: "28 October 1965", officialTitle: "Declaration on the Relation of the Church to Non-Christian Religions" },
        "Dignitatis Humanae": { abbr: "DH", date: "7 December 1965", officialTitle: "Declaration on Religious Freedom" },
        "Gravissimum Educationis": { abbr: "GE", date: "28 October 1965", officialTitle: "Declaration on Christian Education" }
    };

    fetch('vatican2.json')
        .then(res => res.json())
        .then(data => {
            rawData = data.map((item, idx) => ({ ...item, globalIdx: idx }));
            const uniqueDocs = [...new Set(data.map(d => d.doc))].sort();
            
            const list = document.getElementById('doc-list');
            const select = document.getElementById('docFilter');
            
            uniqueDocs.forEach(name => {
                list.innerHTML += `<div class="doc-link" data-name="${name}" onclick="filterByDoc('${name}')">${name}</div>`;
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });

            fuse = new Fuse(rawData, { keys: ['text'], threshold: 0.35 });
            render(rawData.slice(0, 15), "");
        });

    function filterByDoc(name) {
        document.getElementById('docFilter').value = name;
        document.getElementById('searchInput').value = "";
        doSearch();
    }

    function resetUI() {
        document.getElementById('searchInput').value = "";
        document.getElementById('docFilter').value = "ALL";
        doSearch();
    }

    function doSearch() {
        const query = document.getElementById('searchInput').value.trim();
        const filter = document.getElementById('docFilter').value;
        
        let pool = filter === "ALL" ? rawData : rawData.filter(d => d.doc === filter);
        
        if (!query) {
            render(pool.slice(0, 15), "");
            return;
        }

        let results;
        if (!isNaN(query)) {
            // Search by Paragraph Number
            results = pool.filter(p => p.text.startsWith(query + "."));
        } else {
            // Fuzzy Search for text
            results = fuse.search(query).map(r => r.item);
            if (filter !== "ALL") results = results.filter(r => r.doc === filter);
        }
        render(results.slice(0, 30), query);
    }

    function render(items, term) {
        const container = document.getElementById('results');
        container.innerHTML = items.length ? "" : '<div style="text-align:center; padding:50px; opacity:0.5;">No matches found.</div>';
        
        items.forEach(item => {
            const meta = vaticanMeta[item.doc] || { abbr: item.doc, date: "", officialTitle: item.doc };
            let highlightedText = item.text;
            if (term && isNaN(term)) {
                const regex = new RegExp(`(${term})`, 'gi');
                highlightedText = highlightedText.replace(regex, '<mark>$1</mark>');
            }

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <span class="meta-tag">${meta.officialTitle}</span>
                <div class="para-content">${highlightedText}</div>
                <div class="actions">
                    <button class="action-btn" onclick="navigateParagraph(${item.globalIdx - 1})">← Previous</button>
                    <button class="action-btn" onclick="navigateParagraph(${item.globalIdx + 1})">Next →</button>
                    <button class="action-btn copy-special" onclick="copyCitation('${item.doc}', \`${item.text.replace(/`/g, "\\`")}\`)">🔗 Copy DBCS Citation</button>
                    <button class="action-btn" onclick="generatePDF('${item.doc}', \`${item.text.replace(/`/g, "\\`")}\`)">📄 Download PDF</button>
                </div>
            `;
            container.appendChild(card);
        });
        container.scrollTop = 0;
    }

    function navigateParagraph(idx) {
        if (idx >= 0 && idx < rawData.length) {
            render([rawData[idx]], "");
        }
    }

    // STRICT DBCS CITATION BUILDER (Manual Page 10)
    function copyCitation(docKey, text) {
        const meta = vaticanMeta[docKey];
        const paraNum = text.match(/^\d+/)?.[0] || "n.a.";
        
        // Format based on DBCS House Style Guide:
        // Authority, Document Title (Acronym) (Date), no. X.
        const citation = `Vatican II, ${meta.officialTitle} (${meta.abbr}) (${meta.date}), no. ${paraNum}.`;
        
        navigator.clipboard.writeText(citation).then(() => alert("Citation copied to clipboard!"));
    }

    // FORMAL PDF EXPORT
    function generatePDF(docKey, text) {
        const meta = vaticanMeta[docKey];
        const doc = new jsPDF();
        
        // Center Header
        doc.setFont("times", "bold");
        doc.setFontSize(14);
        doc.text("DON BOSCO CENTER OF STUDIES", 105, 20, { align: "center" });
        
        // Official Title
        doc.setFontSize(11);
        doc.text(meta.officialTitle.toUpperCase(), 105, 30, { align: "center" });
        
        // Separator Line
        doc.setLineWidth(0.5);
        doc.line(25, 35, 185, 35);
        
        // Body Content
        doc.setFont("times", "normal");
        doc.setFontSize(12);
        const splitText = doc.splitTextToSize(text, 160);
        doc.text(splitText, 25, 45);
        
        doc.save(`${meta.abbr}_Excerpt.pdf`);
    }
</script>
</body>
</html>
